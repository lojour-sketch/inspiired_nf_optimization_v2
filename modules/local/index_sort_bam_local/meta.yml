name: INDEX_SORT_BAM_local

description: | 
      This process sorts the BAM file by coordinate and indexes it with samtools, in order to be able to perform the processing a posteriori.

      **Command line structure:**
        - First we index the BAM file with samtools index. For this we use the output BAM file from the previous process. 
        - Then we sort the BAM file by read name uwing samtools sort. We will need this for the posterior processing.

tools:
  - samtools:
      description: Alignment tool for mapping DNA sequences
      homepage: https://github.com/samtools/samtools
input:
  - - sample:
        type: string
        description: Sample name
    - bam:
        type: file
        description: Path to the BAM file
output:
  - sorted:
    - - sample:
          type: string
          description: Sample name
      - sorted_bam:
          type: file
          description: BAM file sorted by read name
